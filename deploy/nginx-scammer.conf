# nginx reverse proxy for the Scammer Bot web admin panel.
#
#   sudo cp deploy/nginx-scammer.conf /etc/nginx/sites-available/scammer
#   sudo ln -s /etc/nginx/sites-available/scammer /etc/nginx/sites-enabled/scammer
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d scammer.rishi.uno      # adds HTTPS automatically
#
# The bot must be running with WEB_ADMIN_PORT=8090 (and WEB_ADMIN_PASS set) in
# .env. Keep 8090 closed in the firewall — only 80/443 need to be open; nginx
# reaches the panel locally on 127.0.0.1:8090.

server {
    listen 80;
    listen [::]:80;
    server_name scammer.rishi.uno;

    location / {
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
